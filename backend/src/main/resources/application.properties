spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lanhouse}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lanhouse}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lanhouse123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

server.port=${SERVER_PORT:8080}

# Encoding
spring.mandatory-file-encoding=UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# App config
app.base-url=${APP_BASE_URL:http://localhost:8080}
