version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lanhouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lanhouse
      POSTGRES_USER: lanhouse
      POSTGRES_PASSWORD: lanhouse123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lanhouse-net

  backend:
    build: ./backend
    container_name: lanhouse-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lanhouse
      SPRING_DATASOURCE_USERNAME: lanhouse
      SPRING_DATASOURCE_PASSWORD: lanhouse123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
    depends_on:
      - postgres
    networks:
      - lanhouse-net
    ports:
      - "8090:8080"

volumes:
  postgres_data:

networks:
  lanhouse-net:
    driver: bridge
